<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Kho Tài Liệu</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="hero-section">
        <h1>⚙️ Trạm Quản Lý Vũ Khí</h1>
        <a href="../index.html" class="btn">🔙 Về Trang Chủ Xem Thử</a>
    </header>

    <main class="container" style="display: flex; flex-direction: column; align-items: center;">
        
        <div class="card" style="width: 100%; max-width: 600px; margin-bottom: 2rem;">
            <h2 style="color: #00c6ff; margin-bottom: 15px;">Thêm / Sửa Tài Liệu</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="tenMon" placeholder="Tên môn học (VD: Lập trình C++)" style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); color: #333;">
                
                <input type="text" id="buoiHoc" placeholder="Buổi mấy? (VD: Buổi 1, Chương 2...) - Bỏ trống cũng được" style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); color: #333;">

                <input type="text" id="moTa" placeholder="Mô tả (VD: Slide thầy A...)" style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); color: #333;">
                
                <input type="text" id="linkTaiLieu" placeholder="Link Tài Liệu (Bắt buộc)..." style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); color: #333;">
                
                <input type="text" id="linkVideo" placeholder="Link Video Bài Giảng (Nếu có)..." style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); color: #333;">
                
                <button id="nutLuuTaiLieu" class="btn add-btn" style="border: none; cursor: pointer; padding: 14px; margin-top: 10px;">💾 Đẩy Lên Firebase</button>
            </div>
        </div>

        <div style="width: 100%; max-width: 800px;">
            <h3 style="color: #fff; margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px;">📋 Danh Sách Đã Đăng</h3>
            <div id="danhSachTaiLieu" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
        </div>
    </main>

    <script type="module" src="../js/them.js"></script>
</body>
</html>
